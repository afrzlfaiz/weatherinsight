# WeatherInsight — Render Blueprint (Backend)
# Deploy otomatis: push ke branch main → Render baca file ini.
services:
  - type: web
    name: weatherinsight-api
    runtime: python
    region: singapore # terdekat ke Indonesia
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # diisi manual via Render dashboard (Supabase connection string)
      - key: CORS_ORIGINS
        value: "https://weatherinsight.vercel.app,http://localhost:3000"
