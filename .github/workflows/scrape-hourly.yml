# WeatherInsight — Scraper cuaca per jam
# Open-Meteo Forecast API batch → Supabase PostgreSQL
name: Scrape Cuaca Hourly

on:
  schedule:
    # tiap jam, lewat 5 menit (hindari beban puncak :00)
    - cron: "5 * * * *"
  workflow_dispatch: # manual trigger buat test

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Jalankan scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrape_cuaca.py
